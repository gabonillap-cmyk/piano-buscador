<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Piano AVS — Buscador de Productos</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f4f8; min-height: 100vh; }

    header { background: #1a1a2e; color: white; padding: 14px 16px 16px; display:flex; align-items:center; justify-content:space-between; }
    .logo { font-size: 1.5rem; font-weight: 900; letter-spacing: -0.5px; }
    .logo span { color: #e63946; }
    .header-sub { font-size: 0.75rem; color: #aab4c8; margin-top: 2px; }

    /* Carrito flotante */
    #cart-btn {
      position: relative; background: #e63946; border: none; border-radius: 12px;
      padding: 8px 14px; color: white; font-size: 1.2rem; cursor: pointer;
      display: flex; align-items: center; gap: 6px;
    }
    #cart-count {
      background: white; color: #e63946; border-radius: 50%;
      width: 20px; height: 20px; font-size: 0.7rem; font-weight: 800;
      display: flex; align-items: center; justify-content: center;
      display: none;
    }

    .search-wrap { background: #1a1a2e; padding: 0 16px 16px; }
    .search-box { display: flex; align-items: center; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 16px rgba(0,0,0,0.2); }
    .search-box input { flex: 1; border: none; outline: none; padding: 13px 16px; font-size: 1rem; color: #1a1a2e; }
    .search-box button { background: #e63946; border: none; padding: 13px 16px; cursor: pointer; color: white; font-size: 1rem; }

    /* ── VISTA DEL MAPA ── */
    #map-section { margin: 12px 16px 4px; background: white; border-radius: 16px; padding: 14px; box-shadow: 0 1px 8px rgba(0,0,0,0.08); display: none; }
    #map-section.visible { display: block; }
    .map-title { font-size: 0.75rem; font-weight: 700; color: #666; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    #map-svg { width: 100%; height: auto; display: block; }

    #map-product { display:none; margin-bottom:10px; padding-bottom:10px; border-bottom:1px solid #e2e8f0; }
    #map-product-inner { display:flex; gap:12px; align-items:flex-start; }
    #map-prod-img { width:68px; height:68px; min-width:68px; border-radius:10px; background:#f1f5f9; border:1.5px solid #e2e8f0; display:flex; align-items:center; justify-content:center; font-size:1.8rem; color:#cbd5e1; }
    #map-prod-info { flex:1; min-width:0; }
    #map-product .card-name { font-size:0.92rem; font-weight:700; color:#1a1a2e; line-height:1.3; margin-bottom:5px; }
    #map-product .card-meta { display:flex; gap:6px; flex-wrap:wrap; }
    #map-product .ubicacion { display:flex; gap:8px; margin-top:8px; }
    #map-product .loc-block { flex:1; background:#f0fdf4; border:1.5px solid #bbf7d0; border-radius:10px; padding:7px 8px; text-align:center; }
    #map-product .loc-label { font-size:0.6rem; color:#4ade80; text-transform:uppercase; letter-spacing:0.5px; font-weight:700; }
    #map-product .loc-value { font-size:1.3rem; font-weight:800; color:#166534; line-height:1.1; }

    /* ── VISTA CARRITO ── */
    #cart-section { margin: 12px 16px 4px; background: white; border-radius: 16px; padding: 14px; box-shadow: 0 1px 8px rgba(0,0,0,0.08); display: none; }
    #cart-section.visible { display: block; }
    .cart-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
    .cart-title { font-size:0.75rem; font-weight:700; color:#666; text-transform:uppercase; letter-spacing:0.5px; }
    #clear-cart { background:none; border:none; color:#e63946; font-size:0.78rem; cursor:pointer; font-weight:600; }
    #route-svg { width:100%; height:auto; display:block; }
    #route-steps { margin-top:10px; display:flex; flex-direction:column; gap:6px; }
    .route-step { display:flex; align-items:center; gap:10px; padding:8px 10px; border-radius:10px; background:#f8fafc; }
    .step-num { width:24px; height:24px; border-radius:50%; background:#1a1a2e; color:white; font-size:0.75rem; font-weight:800; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .step-info { flex:1; }
    .step-pasillo { font-size:0.7rem; color:#888; font-weight:600; margin-bottom:4px; }
    .step-productos { display:flex; flex-direction:column; gap:4px; }
    .step-item { display:flex; justify-content:space-between; align-items:baseline; gap:8px; }
    .step-item-name { font-size:0.82rem; color:#1a1a2e; font-weight:500; line-height:1.4; flex:1; }
    .step-item-loc { font-size:0.72rem; font-weight:700; color:#166534; background:#f0fdf4; border:1px solid #bbf7d0; border-radius:6px; padding:2px 7px; white-space:nowrap; }
    #route-btn { width:100%; margin-top:10px; padding:12px; background:#1a1a2e; color:white; border:none; border-radius:12px; font-size:0.9rem; font-weight:700; cursor:pointer; }

    /* filters */
    .filter-bar { padding: 10px 16px 4px; display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; }
    .filter-bar::-webkit-scrollbar { display: none; }
    .chip { background: white; border: 1.5px solid #dde3ee; border-radius: 20px; padding: 5px 12px; font-size: 0.76rem; white-space: nowrap; cursor: pointer; color: #444; transition: all 0.15s; }
    .chip.active { background: #1a1a2e; border-color: #1a1a2e; color: white; }
    #counter { padding: 6px 16px 4px; font-size: 0.8rem; color: #888; }

    /* cards */
    #results { padding: 0 16px 32px; display: flex; flex-direction: column; gap: 10px; }
    .card { background: white; border-radius: 14px; padding: 12px 14px; box-shadow: 0 1px 6px rgba(0,0,0,0.07); display: flex; flex-direction: column; gap: 7px; animation: fadeIn 0.2s ease; border: 2px solid transparent; transition: border-color 0.15s; }
    .card.selected { border-color: #22c55e; }
    .card.in-cart { border-color: #f59e0b; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
    .card-top { display:flex; align-items:flex-start; justify-content:space-between; gap:8px; }
    .card-name { font-size:0.9rem; font-weight:600; color:#1a1a2e; line-height:1.3; flex:1; cursor:pointer; }
    .add-cart-btn { background:#1a1a2e; border:none; border-radius:8px; padding:6px 10px; color:white; font-size:0.75rem; font-weight:700; cursor:pointer; white-space:nowrap; flex-shrink:0; transition:background 0.15s; }
    .add-cart-btn.added { background:#f59e0b; }
    .card-meta { display: flex; gap: 6px; flex-wrap: wrap; }
    .tag { font-size: 0.7rem; padding: 3px 8px; border-radius: 6px; font-weight: 500; }
    .tag-tipo { background: #eef2ff; color: #3730a3; }
    .tag-precio { background: #fef3c7; color: #92400e; font-weight: 700; }
    .ubicacion { display: flex; gap: 8px; }
    .loc-block { flex: 1; background: #f0fdf4; border: 1.5px solid #bbf7d0; border-radius: 10px; padding: 7px 8px; text-align: center; cursor:pointer; }
    .loc-label { font-size: 0.6rem; color: #4ade80; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700; }
    .loc-value { font-size: 1.3rem; font-weight: 800; color: #166534; line-height: 1.1; }
    .empty { text-align: center; padding: 50px 20px; color: #999; }
    .empty .icon { font-size: 2.5rem; margin-bottom: 10px; }

    /* SVG animacion */
    @keyframes dash { to { stroke-dashoffset:-200; } }
    .route-animated { animation: dash 6s linear infinite; }
  </style>
</head>

    <div class="logo">piano<span>.</span></div>

function toggleCart() {
  const cs = document.getElementById('cart-section');
  const ms = document.getElementById('map-section');
  if (cart.length === 0) return;
  if (cs.classList.contains('visible')) {
    cs.classList.remove('visible');
    if (lastSelected) ms.classList.add('visible');
  } else {
    ms.classList.remove('visible');
    cs.classList.add('visible');
    renderCartRoute();
  }
}

function addToCart(p) {
  if (cart.find(c => c.sku === p.sku && c.nombre === p.nombre)) {
    removeFromCart(p);
    return;
  }
  cart.push(p);
  updateCartUI();
}

function removeFromCart(p) {
  cart = cart.filter(c => !(c.sku === p.sku && c.nombre === p.nombre));
  updateCartUI();
}

function isInCart(p) {
  return !!cart.find(c => c.sku === p.sku && c.nombre === p.nombre);
}

function clearCart() {
  cart = [];
  updateCartUI();
  document.getElementById('cart-section').classList.remove('visible');
  document.getElementById('map-section').classList.add('visible');
  renderSearch();
}

function updateCartUI() {
  const count = document.getElementById('cart-count');
  count.textContent = cart.length;
  count.style.display = cart.length > 0 ? 'flex' : 'none';
  // Actualizar botones en tarjetas
  document.querySelectorAll('.add-cart-btn').forEach(btn => {
    const nombre = btn.dataset.nombre;
    const inC = cart.find(c => c.nombre === nombre);
    btn.textContent = inC ? '✓ En lista' : '+ Lista';
    btn.classList.toggle('added', !!inC);
  });
  document.querySelectorAll('.card').forEach(card => {
    const nombre = card.dataset.nombre;
    card.classList.toggle('in-cart', !!cart.find(c => c.nombre === nombre));
  });
}

const ZONE_INFO = {
  G:{row:3,col:1,x:63,y:135},  H:{row:3,col:2,x:131,y:135},
  K:{row:3,col:3,x:199,y:135}, L:{row:3,col:4,x:262,y:135},

  J:{row:1,col:3,x:199,y:47},  F:{row:1,col:4,x:262,y:47},
  T:{row:3,col:1,x:63,y:135},  M:{row:3,col:2,x:131,y:135},
  N:{row:3,col:3,x:199,y:135}, Z:{row:3,col:4,x:262,y:135},
};
// Corredor vertical a la izquierda de cada columna
function corridorLeft(col) { return [97,97,165,233][col-1]; }

function buildChainPath(stops) {
  // Genera una polyline encadenada desde entrada → stop1 → stop2 → ... sin volver
  const pts = [[160,168]];
  let prev = null;
  stops.forEach(pa => {
    const z = ZONE_INFO[pa]; if (!z) return;
    if (!prev) {
      // Desde entrada: corredor horizontal → corredor vertical → entrar zona
      const cx = corridorLeft(z.col);
      pts.push([cx, 168]);
      pts.push([cx, z.y]);
      pts.push([z.x, z.y]);
    } else if (z.row === prev.row) {
      // Misma fila: salir al corredor entre columnas y entrar a la zona
      const minCol = Math.min(z.col, prev.col);
      const cx = corridorLeft(minCol + (z.col > prev.col ? 1 : 0));
      pts.push([cx, z.y]);
      pts.push([z.x, z.y]);
    } else {
      // Diferente fila: ir al corredor lateral más cercano, cambiar de fila, entrar zona
      const exitCx = corridorLeft(prev.col < 3 ? prev.col : prev.col - 1);
      const entryCx = corridorLeft(z.col < 3 ? z.col : z.col - 1);
      pts.push([exitCx, prev.y]);  // salir al corredor
      pts.push([entryCx, prev.y]); // moverse horizontal si necesario
      pts.push([entryCx, z.y]);    // cambiar de fila
      pts.push([z.x, z.y]);        // entrar zona
    }
    prev = z;
  });
  // Deduplicar puntos iguales consecutivos
  return pts.filter((p,i) => i===0 || !(p[0]===pts[i-1][0] && p[1]===pts[i-1][1]));
}

function renderCartRoute() {
  if (cart.length === 0) return;

  // Agrupar por pasillo y ordenar según serpiente
  const byPasillo = {};
  cart.forEach(p => {
    const pa = ZONE_ALIAS[p.pasillo] || p.pasillo;
    if (!byPasillo[pa]) byPasillo[pa] = [];
    byPasillo[pa].push(p);
  });
  const orderedPasillos = COLLECT_ORDER
    .map(p => ZONE_ALIAS[p] || p)
    .filter((p,i,a) => a.indexOf(p) === i)
    .filter(p => byPasillo[p]);

  // Reset mapa
  ['C','I','J','F','A','B','E','D','G','H','K','L'].forEach(p => {
    const el = document.getElementById('rz-'+p);
    if (el) { el.setAttribute('fill','#e2e8f0'); el.setAttribute('stroke','#cbd5e1'); el.setAttribute('stroke-width','1'); }
  });
  document.getElementById('cart-markers').innerHTML = '';

  // Colorear pasillos del carrito
  orderedPasillos.forEach((pa, idx) => {
    const el = document.getElementById('rz-'+pa);
    if (el) { el.setAttribute('fill',ZONE_COLORS[pa]||'#fde68a'); el.setAttribute('stroke',ZONE_STROKE[pa]||'#fbbf24'); el.setAttribute('stroke-width','2'); }
    const pos = ZONE_POS[pa]; if (!pos) return;
    // Marcador numerado
    const g = document.createElementNS('http://www.w3.org/2000/svg','g');
    g.setAttribute('transform',`translate(${pos.x},${pos.y})`);
    const circle = document.createElementNS('http://www.w3.org/2000/svg','circle');
    circle.setAttribute('r','10'); circle.setAttribute('fill','#1a1a2e');
    const txt = document.createElementNS('http://www.w3.org/2000/svg','text');
    txt.setAttribute('text-anchor','middle'); txt.setAttribute('y','4');
    txt.setAttribute('font-size','8'); txt.setAttribute('fill','white');
    txt.setAttribute('font-family','Arial'); txt.setAttribute('font-weight','bold');
    txt.textContent = idx+1;
    g.appendChild(circle); g.appendChild(txt);
    document.getElementById('cart-markers').appendChild(g);
  });

  // Construir y dibujar ruta encadenada
  const pts = buildChainPath(orderedPasillos);
  const routeEl = document.getElementById('cart-route-line');
  routeEl.setAttribute('points', pts.map(p=>p.join(',')).join(' '));
  routeEl.classList.add('active');

  // Pasos de texto
  const steps = document.getElementById('route-steps');
  steps.innerHTML = orderedPasillos.map((pa, idx) => {
    const prods = byPasillo[pa];
    const items = prods.map(p => `
      <div class="step-item">
        <span class="step-item-name">• ${p.nombre}</span>
        <span class="step-item-loc">G${p.gondola} · Bandeja ${p.bandeja}</span>
      </div>`).join('');
    return `
      <div class="route-step">
        <div class="step-num">${idx+1}</div>
        <div class="step-info">
          <div class="step-pasillo">Pasillo ${pa} · ${PASILLO_NOMBRES[pa]||''}</div>
          <div class="step-productos">${items}</div>
        </div>
      </div>`;
  }).join('');
}

  document.getElementById('map-prod-bandeja').textContent=bandeja;
  const meta=document.getElementById('map-prod-meta');
  meta.innerHTML=`<span class="tag tag-tipo">${p.tipo}</span>${p.precio&&p.precio!=='nan'?`<span class="tag tag-precio">${formatPrice(p.precio)}</span>`:''}`
  section.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function hideMap() {
  document.getElementById('map-section').classList.remove('visible');
  document.getElementById('dest-marker').style.display='none';
  document.getElementById('map-product').style.display='none';
  const r=document.getElementById('route-line');
  r.classList.remove('active'); r.setAttribute('points','');
  resetZones();
}

function formatPrice(pr) {
  const n=parseFloat(pr); if(isNaN(n)) return '';
  return '$'+Math.round(n).toLocaleString('es-CL');
}

// ── FILTROS ──
const tipos=[...new Set(PRODUCTS.map(p=>p.tipo))].filter(t=>t!=='nan').sort();
let activeFilter=null;
const filterBar=document.getElementById('filters');
const allChip=document.createElement('div');
allChip.className='chip active'; allChip.textContent='Todos';
allChip.onclick=()=>setFilter(null,allChip);
filterBar.appendChild(allChip);
tipos.forEach(tipo=>{
  const chip=document.createElement('div');
  chip.className='chip'; chip.textContent=tipo;
  chip.onclick=()=>setFilter(tipo,chip);
  filterBar.appendChild(chip);
});

function setFilter(tipo,el){
  activeFilter=tipo;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active'); renderSearch();
}

function clearSearch(){
  document.getElementById('search').value='';
  hideMap(); renderSearch();
}

function renderSearch() {
  const q=document.getElementById('search').value.trim().toLowerCase();
  const results=document.getElementById('results');
  const counter=document.getElementById('counter');
  let filtered=PRODUCTS;
  if(activeFilter) filtered=filtered.filter(p=>p.tipo===activeFilter);
  if(q.length>1) filtered=filtered.filter(p=>p.nombre.toLowerCase().includes(q));
  if(!q&&!activeFilter){
    results.innerHTML=`<div class="empty"><div class="icon">🔍</div><p>Escribe el nombre del producto para encontrar su ubicación</p></div>`;
    counter.textContent=''; hideMap(); return;
  }
  const shown=filtered.slice(0,50);
  counter.textContent=filtered.length===0?'':`${filtered.length} resultado${filtered.length!==1?'s':''}${filtered.length>50?' (mostrando primeros 50)':''}`;
  if(shown.length===0){
    results.innerHTML=`<div class="empty"><div class="icon">😕</div><p>No encontramos "<strong>${q}</strong>"</p></div>`;
    hideMap(); return;
  }
  showMap(shown[0]);
  results.innerHTML=shown.map((p,idx)=>{
    const inC=isInCart(p);
    return `<div class="card${idx===0?' selected':''}${inC?' in-cart':''}" data-nombre="${p.nombre}">
      <div class="card-top">
        <div class="card-name" onclick="selectProduct(${JSON.stringify(p).replace(/"/g,'&quot;')})">${p.nombre}</div>
        <button class="add-cart-btn${inC?' added':''}" data-nombre="${p.nombre}"
          onclick="addToCart(${JSON.stringify(p).replace(/"/g,'&quot;')}); updateCartUI();">
          ${inC?'✓ En lista':'+ Lista'}
        </button>
      </div>
      <div class="card-meta">
        <span class="tag tag-tipo">${p.tipo}</span>
        ${p.precio&&p.precio!=='nan'?`<span class="tag tag-precio">${formatPrice(p.precio)}</span>`:''}
      </div>
      <div class="ubicacion" onclick="selectProduct(${JSON.stringify(p).replace(/"/g,'&quot;')})">
        <div class="loc-block"><div class="loc-label">Pasillo</div><div class="loc-value">${p.pasillo}</div></div>
        <div class="loc-block"><div class="loc-label">Góndola</div><div class="loc-value">${p.gondola}</div></div>
        <div class="loc-block"><div class="loc-label">Bandeja</div><div class="loc-value">${p.bandeja}</div></div>
      </div>
    </div>`;
  }).join('');
}

function selectProduct(p) {
  document.querySelectorAll('.card').forEach(c=>c.classList.remove('selected'));
  const cards = document.querySelectorAll('.card');
  cards.forEach(c => { if(c.dataset.nombre===p.nombre) c.classList.add('selected'); });
  showMap(p);
}

document.getElementById('search').addEventListener('input', renderSearch);
</script>
</body>
</html>
